name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pillow pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Оптимизатор_Раскроя" cutting_optimizer.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Оптимизатор_Раскроя
        path: dist/Оптимизатор_Раскроя.exe
